data:
  work_dir: benchmarks/elsa_output/ecoli/elsa_index_nopca
ingest:
  gene_caller: prodigal
  min_cds_aa: 60
  run_pfam: false
plm:
  model: esm2_t12
  device: cuda
  fp16: true
  batch_amino_acids: 16000
  project_to_D: 0
  l2_normalize: true
system:
  jobs: 1
  rng_seed: 17
chain:
  index_backend: faiss_ivfflat
  faiss_nprobe: 32
  hnsw_k: 50
  similarity_threshold: 0.85
  max_gap_genes: 2
  min_chain_size: 2
  gap_penalty_scale: 0.0
  jaccard_tau: 0.3
  min_genome_support: 2
