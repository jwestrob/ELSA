# Cross-Species Benchmark — gLM2
# Same 30 genomes, gLM2 150M embeddings instead of ESM2

data:
  work_dir: ./benchmarks/elsa_output/cross_species_glm2

ingest:
  gene_caller: prodigal
  run_pfam: false

plm:
  model: glm2_150m
  device: auto
  batch_amino_acids: 16000
  project_to_D: 0
  l2_normalize: true
  fp16: true

chain:
  hnsw_k: 50
  hnsw_m: 32
  hnsw_ef_construction: 200
  hnsw_ef_search: 128
  similarity_threshold: 0.85
  max_gap_genes: 2
  min_chain_size: 2
  jaccard_tau: 0.3
  mutual_k: 3
  df_max: 200
  min_genome_support: 2

system:
  rng_seed: 42
  jobs: auto
