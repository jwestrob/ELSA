# Cross-Species Benchmark Configuration
# 30 genomes: E. coli (21) + Salmonella (5) + Klebsiella (4)

data:
  work_dir: ./benchmarks/elsa_output/cross_species

ingest:
  gene_caller: prodigal
  run_pfam: false

plm:
  model: esm2_t12
  device: auto
  batch_amino_acids: 8000
  project_to_D: 0
  l2_normalize: true
  fp16: true

chain:
  hnsw_k: 50
  hnsw_m: 32
  hnsw_ef_construction: 200
  hnsw_ef_search: 128
  similarity_threshold: 0.85
  max_gap_genes: 2
  min_chain_size: 2
  jaccard_tau: 0.3
  mutual_k: 3
  df_max: 200
  min_genome_support: 2

system:
  rng_seed: 42
  jobs: auto
